apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: my-ai-service:v1 # The image we built in Step 8
        imagePullPolicy: Never
        ports:
        - containerPort: 8000