services:
  # --- API Gateway (Node.js/Fastify) ---
  api-gateway:
    build: ./node-services/api-gateway
    ports:
      - "3005:3005"
    environment:
      - AI_SERVICE_URL=http://ai-service:8001
      - PORT=3005
    depends_on:
      - ai-service
    networks:
      - ai-network

  # --- AI Service (Python/FastAPI) ---
  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - QDRANT_HOST=qdrant
    volumes:
      - ./ai-service:/app
      - ai_model_cache:/root/.cache/torch/sentence_transformers
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    networks:
      - ai-network

  # --- Vector Database (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ai-network

  # --- Relational Database (PostgreSQL) ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # FLASHY: This automatically runs your tables on startup
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai-network

  # --- Frontend (Vite) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3005 # Pointing to the Gateway port
    networks:
      - ai-network
    command: npm run dev -- --host 0.0.0.0

networks:
  ai-network:
    driver: bridge

volumes:
  qdrant_storage:
  ai_model_cache:
  postgres_data:
